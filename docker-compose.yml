services:
  hana-portfolio-be-sit-services:
    container_name: "hana-portfolio-be-sit-services"
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 512M
    mem_reservation: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hana-portfolio-be.rule=Host(`portfolio-api.localhost`)"
      - "traefik.http.routers.hana-portfolio-be.entrypoints=web"
      - "traefik.http.routers.hana-portfolio-be.service=hana-portfolio-be@docker"
      - "traefik.http.services.hana-portfolio-be.loadbalancer.server.scheme=http"
      - "traefik.http.services.hana-portfolio-be.loadbalancer.server.port=3001"
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.hana-portfolio.sit
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - hana-portfolio-db-sit-services
    networks:
      - hana-network
  hana-portfolio-db-sit-services:
    image: postgres:18.3
    container_name: "hana-portfolio-db-sit-services"
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 256M
    mem_reservation: 128M
    ports:
      - "5432:5432"
    environment:
      PGPASSWORD: "postgres"
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - "hana-portfolio-db-sit-services:/var/lib/postgresql/data"
      - "./module/instance/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh"
      - "./module/db:/backup"
    networks:
      - hana-network
  hana-portfolio-redis-sit-services:
    image: redis:8.6.1-alpine
    container_name: hana-portfolio-redis-sit-services
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 256M
    mem_reservation: 128M
    ports:
      - "8585:6379"
    depends_on:
      - hana-portfolio-db-sit-services
    volumes:
      - hana-portfolio-redis-sit-services:/data
      - ./module/redis/config.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass MySecurePassword
    environment:
      - REDIS_PASSWORD=MySecurePassword
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - hana-network
networks:
  hana-network:
    name: hana-network
    external: true
volumes:
  hana-portfolio-db-sit-services:
    driver: local
  hana-portfolio-redis-sit-services:
    driver: local
